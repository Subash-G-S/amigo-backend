services:

  postgres:
    image: postgres:16

    container_name: amigo-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "0224"
      POSTGRES_DB: "amigo"

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .

    container_name: amigo-backend

    restart: unless-stopped

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: